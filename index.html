<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Multiplayer Tic-Tac-Toe - Fully Fixed Layout</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header-controls">
            <h1>Tic-Tac-Toe</h1>
            <button class="theme-toggle" id="themeToggle">
                🌙 Dark
            </button>
        </div>

        <div class="menu-section" id="lobbyMenu">
            <input type="text" id="hostNameInput" placeholder="Enter Your Name">
            <button id="btnCreate">Create Online Room</button>
            
            <div id="roomCodeDisplay" class="hidden">
                <div style="font-size: 0.85rem; text-align: center;">Share Room ID (Click to copy):</div>
                <div class="room-display" id="roomIdText">Generating...</div>
            </div>
            
            <hr style="width: 100%; border: none; border-top: 1px solid var(--border-color); margin: 10px 0;">
            
            <div class="input-group">
                <input type="text" id="joinInput" placeholder="Enter Friend's Room ID">
                <button id="btnJoin" class="secondary">Join Room</button>
            </div>
            <button id="btnLocal" class="secondary">Play Local Pass & Play</button>

            <div class="guide-panel">
                <h3>📖 Game Room Panel</h3>
                <div style="line-height: 1.4;">Host rooms instantly, enjoy secure direct peer-to-peer audio recording, file attachments, and complete tabbed emoji packs.</div>
            </div>
        </div>

        <div id="gameZone" class="hidden">
            <div class="lobby-dashboard" id="lobbyDashboard">
                <div class="dashboard-row">
                    <span class="dashboard-label">Players Count:</span>
                    <span class="dashboard-value" id="playerCount">1 / 2</span>
                </div>
                <div class="dashboard-row">
                    <span class="dashboard-label">In Room:</span>
                    <div class="room-players-wrapper" id="playerNamesDisplay">Loading players...</div>
                    <button id="evictBtn" class="hidden">Evict Player</button>
                </div>
            </div>

            <div class="status-bar" id="statusText">Connecting...</div>

            <div class="board" id="board">
                <button class="cell" data-index="0"></button>
                <button class="cell" data-index="1"></button>
                <button class="cell" data-index="2"></button>
                <button class="cell" data-index="3"></button>
                <button class="cell" data-index="4"></button>
                <button class="cell" data-index="5"></button>
                <button class="cell" data-index="6"></button>
                <button class="cell" data-index="7"></button>
                <button class="cell" data-index="8"></button>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-msg system">Welcome to online chat!</div>
                </div>

                <div class="emoji-picker-panel hidden" id="emojiPickerPanel">
                    <div class="emoji-tabs" id="emojiTabsContainer"></div>
                    <div class="emoji-grid" id="emojiGridBox"></div>
                </div>
                
                <div class="chat-input-row">
                    <input type="file" id="fileInput" class="hidden">
                    
                    <div class="input-capsule">
                        <button class="capsule-icon-btn" id="emojiBtn" title="Emojis" disabled>
                            <svg class="ui-svg-icon" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                                <line x1="9" y1="9" x2="9.01" y2="9"></line>
                                <line x1="15" y1="9" x2="15.01" y2="9"></line>
                            </svg>
                        </button>
                        
                        <input type="text" id="chatInput" placeholder="Type a message..." disabled>
                        
                        <button class="capsule-icon-btn" id="fileBtn" title="Send File" disabled>
                            <svg class="ui-svg-icon" viewBox="0 0 24 24">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                            </svg>
                        </button>

                        <button class="capsule-icon-btn" id="chatSendBtn" title="Send" style="color: var(--accent);" disabled>
                            <svg class="ui-svg-icon" viewBox="0 0 24 24">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>

                    <button id="voiceBtn" class="circular-voice-btn" title="Record Voice Note" disabled>
                        <svg id="voiceIconSvg" viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: currentColor; display: block;">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.3 6-6.72h-1.7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <button id="resetBtn" style="flex: 1;">Restart Match</button>
                <button id="leaveBtn" class="secondary">Leave Room</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
